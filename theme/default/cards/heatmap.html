<h2>活跃热力图</h2>
<div style="display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap;">
    <button class="btn btn-primary" id="hm-btn-90">近3月</button>
    <button class="btn btn-secondary" id="hm-btn-180">近半年</button>
    <button class="btn btn-secondary" id="hm-btn-365">近一年</button>
</div>
<div style="display: flex; justify-content: center; margin-bottom: 6px;">
    <select id="hm-device" style="display: none; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-primary); font-size: 0.85em;">
        <option value="">全部设备</option>
    </select>
</div>
<div id="heatmap-container" style="width: 100%; height: 200px;"></div>
<p id="hm-empty" style="color: var(--text-muted); font-size: 0.85em; display: none;">暂无活跃数据</p>

<script>
(function() {
    let hmChart = null;
    let currentDays = 90;
    let currentDevice = '';

    // 读取用户配置的默认天数
    fetch('/api/settings/user_config').then(function(r){ return r.json(); }).then(function(d){
        var cfg = d.config || {};
        var days = cfg.heatmap_default_days || 90;
        currentDays = days;
        setActive(days);
        loadHeatmap(days);
    }).catch(function(){
        setActive(90);
        loadHeatmap(90);
    });

    function ensureECharts(cb) {
        if (window.echarts) { cb(); return; }
        var s = document.createElement('script');
        s.src = '/static/echarts.min.js';
        s.onload = cb;
        document.head.appendChild(s);
    }

    function loadDevices() {
        fetch('/api/stats/devices').then(r => r.json()).then(d => {
            var sel = document.getElementById('hm-device');
            if (!d.devices || d.devices.length <= 1) { sel.style.display = 'none'; return; }
            sel.style.display = '';
            d.devices.forEach(function(dev) {
                var opt = document.createElement('option');
                opt.value = dev; opt.textContent = dev;
                sel.appendChild(opt);
            });
        }).catch(function(){});
    }

    function loadHeatmap(days) {
        var url = '/api/stats/heatmap?days=' + days;
        if (currentDevice) url += '&device=' + encodeURIComponent(currentDevice);
        fetch(url).then(function(r){ return r.json(); }).then(function(d) {
            renderHeatmap(d.data || []);
        }).catch(function(){
            document.getElementById('hm-empty').style.display = 'block';
            document.getElementById('heatmap-container').style.display = 'none';
        });
    }

    function renderHeatmap(data) {
        var container = document.getElementById('heatmap-container');
        var emptyEl = document.getElementById('hm-empty');
        if (hmChart) { hmChart.dispose(); hmChart = null; }
        if (!data || data.length === 0 || data.every(function(d){ return d.seconds === 0; })) {
            emptyEl.style.display = 'block';
            container.style.display = 'none';
            return;
        }
        emptyEl.style.display = 'none';
        container.style.display = '';

        var style = getComputedStyle(document.body);
        var values = data.map(function(d){ return d.seconds; });
        var maxVal = Math.max.apply(null, values) || 1;
        var today = data[data.length - 1] && data[data.length - 1].date;
        var firstDay = data[0] && data[0].date;

        hmChart = echarts.init(container);
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var opt = {
            tooltip: {
                formatter: function(p) {
                    var h = Math.floor(p.value[1] / 3600);
                    var m = Math.floor((p.value[1] % 3600) / 60);
                    return p.value[0] + '<br/>' + h + 'h ' + m + 'm';
                }
            },
            visualMap: {
                min: 0,
                max: maxVal,
                type: 'piecewise',
                orient: 'horizontal',
                left: 'center',
                bottom: 0,
                itemWidth: 12,
                itemHeight: 12,
                textStyle: { color: style.getPropertyValue('--text-secondary').trim() || '#666', fontSize: 10 },
                pieces: [
                    { min: 0, max: 0, label: '无', color: isDark ? '#1a1a2e' : '#ebedf0' },
                    { min: 1, max: Math.max(60, Math.ceil(maxVal * 0.25)), label: '低', color: '#9be9a8' },
                    { min: Math.max(61, Math.ceil(maxVal * 0.25) + 1), max: Math.ceil(maxVal * 0.5), label: '中', color: '#40c463' },
                    { min: Math.ceil(maxVal * 0.5) + 1, max: Math.ceil(maxVal * 0.75), label: '高', color: '#30a14e' },
                    { min: Math.ceil(maxVal * 0.75) + 1, label: '极高', color: '#216e39' }
                ],
                calculable: false
            },
            calendar: {
                top: 8,
                left: 30,
                right: 10,
                bottom: 50,
                range: [firstDay, today],
                cellSize: ['auto', 13],
                itemStyle: { borderColor: isDark ? '#1a1a2e' : '#fff', borderWidth: 2 },
                dayLabel: { fontSize: 10, color: style.getPropertyValue('--text-secondary').trim() || '#666' },
                monthLabel: { fontSize: 10, color: style.getPropertyValue('--text-secondary').trim() || '#666' },
                yearLabel: { show: true, fontSize: 11 }
            },
            series: [{
                type: 'heatmap',
                coordinateSystem: 'calendar',
                data: data.map(function(d){ return [d.date, d.seconds]; })
            }]
        };
        hmChart.setOption(opt);
    }

    function setActive(days) {
        currentDays = days;
        ['90','180','365'].forEach(function(k){
            var b = document.getElementById('hm-btn-' + k);
            b.className = parseInt(k) === days ? 'btn btn-primary' : 'btn btn-secondary';
        });
    }

    ensureECharts(function() {
        loadDevices();
        document.getElementById('hm-btn-90').addEventListener('click', function(){ setActive(90); loadHeatmap(90); });
        document.getElementById('hm-btn-180').addEventListener('click', function(){ setActive(180); loadHeatmap(180); });
        document.getElementById('hm-btn-365').addEventListener('click', function(){ setActive(365); loadHeatmap(365); });
        document.getElementById('hm-device').addEventListener('change', function(){
            currentDevice = this.value;
            loadHeatmap(currentDays);
        });
        // 默认加载由上方的 /api/settings/user_config fetch 触发
    });

    window.addEventListener('resize', function() { if (hmChart) hmChart.resize(); });
})();
</script>
