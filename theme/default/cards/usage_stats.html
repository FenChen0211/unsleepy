<h2>使用分析</h2>
<div style="display: flex; gap: 6px; justify-content: center; margin-bottom: 6px;">
    <select id="stats-device-sel" style="display: none; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-primary); font-size: 0.85em; width: 100%; max-width: 200px;">
        <option value="">全部设备</option>
    </select>
</div>
<div style="display: flex; gap: 6px; justify-content: center; margin-bottom: 14px;">
    <button class="btn btn-primary" id="stats-btn-today">今日</button>
    <button class="btn btn-secondary" id="stats-btn-week">本周</button>
    <button class="btn btn-secondary" id="stats-btn-month">本月</button>
</div>
<div id="stats-usage-list" style="text-align: left; min-height: 40px;"></div>
<div style="display: flex; gap: 6px; justify-content: center; margin: 12px 0 4px;">
    <button class="btn btn-secondary" id="stats-chart-app">应用占比</button>
    <button class="btn btn-primary" id="stats-chart-category">分类占比</button>
</div>
<div style="max-width: 240px; margin: 10px auto 0;">
    <canvas id="stats-category-chart"></canvas>
</div>
<p id="stats-chart-empty" style="color: var(--text-secondary); display: none; font-size: 0.85em;">暂无数据</p>

<script>
(function() {
    let chartInst = null;
    const btns = {
        today: document.getElementById('stats-btn-today'),
        week: document.getElementById('stats-btn-week'),
        month: document.getElementById('stats-btn-month')
    };
    const chartBtns = {
        app: document.getElementById('stats-chart-app'),
        category: document.getElementById('stats-chart-category')
    };
    const fallbackColors = ['#d99a27','#a8751e','#f0b445','#6f5b34','#49b86a','#8f8a7e','#d35f5f','#c6b89a'];
    const useCustomChartColors = {{ 'true' if chart_use_custom_colors else 'false' }};

    function setActive(p) {
        Object.keys(btns).forEach(k => {
            btns[k].className = k === p ? 'btn btn-primary' : 'btn btn-secondary';
        });
    }

    function escapeTags(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    function setChartMode(mode) {
        currentChartMode = mode;
        chartBtns.app.className = mode === 'app' ? 'btn btn-primary' : 'btn btn-secondary';
        chartBtns.category.className = mode === 'category' ? 'btn btn-primary' : 'btn btn-secondary';
        drawChart(currentApps);
    }

    function colorForIndex(index) {
        return fallbackColors[index % fallbackColors.length];
    }

    function buildChartItems(apps) {
        if (currentChartMode === 'app') {
            return apps.map((a, index) => ({
                name: a.app_name || '未知应用',
                seconds: a.seconds || 0,
                color: useCustomChartColors ? (a.category_color || colorForIndex(index)) : colorForIndex(index)
            }));
        }

        const catMap = {};
        let ci = 0;
        apps.forEach(a => {
            const cat = a.category || '未分类';
            if (!catMap[cat]) {
                catMap[cat] = {
                    seconds: 0,
                    color: useCustomChartColors ? (a.category_color || colorForIndex(ci)) : colorForIndex(ci)
                };
                ci++;
            }
            catMap[cat].seconds += a.seconds || 0;
        });
        return Object.keys(catMap).map(name => ({
            name: name,
            seconds: catMap[name].seconds,
            color: catMap[name].color
        }));
    }

    function drawChart(apps) {
        const ctx = document.getElementById('stats-category-chart');
        const emptyEl = document.getElementById('stats-chart-empty');
        if (chartInst) { chartInst.destroy(); chartInst = null; }

        if (!apps || apps.length === 0) {
            emptyEl.style.display = 'block';
            ctx.style.display = 'none';
            return;
        }

        const chartItems = buildChartItems(apps).filter(item => item.seconds > 0);
        if (chartItems.length === 0) {
            emptyEl.style.display = 'block';
            ctx.style.display = 'none';
            return;
        }

        emptyEl.style.display = 'none';
        ctx.style.display = 'block';

        const style = getComputedStyle(document.body);
        chartInst = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: chartItems.map(item => item.name),
                datasets: [{
                    data: chartItems.map(item => item.seconds),
                    backgroundColor: chartItems.map(item => item.color),
                    borderWidth: 1.5,
                    borderColor: style.getPropertyValue('--bg-glass').trim().replace(/rgba?\(.*\)/,'') || 'transparent'
                }]
            },
            options: {
                responsive: true,
                cutout: '58%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: style.getPropertyValue('--text-secondary').trim() || '#666',
                            padding: 10,
                            font: { size: 10 },
                            boxWidth: 8
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const t = ctx.dataset.data.reduce((a,b)=>a+b,0);
                                const p = t>0?(ctx.raw/t*100).toFixed(1):0;
                                const h = Math.floor(ctx.raw/3600);
                                const m = Math.floor((ctx.raw%3600)/60);
                                return ' ' + ctx.label + ': ' + h + 'h ' + m + 'm (' + p + '%)';
                            }
                        }
                    }
                }
            }
        });
    }

    let currentPer = 'today';
    let currentDev = '';
    let currentChartMode = 'category';
    let currentApps = [];

    async function load(period) {
        currentPer = period;
        setActive(period);
        const listEl = document.getElementById('stats-usage-list');
        listEl.innerHTML = '<p style="color: var(--text-secondary); text-align: center; font-size: 0.85em;">加载中...</p>';

        let apps = [];
        try {
            let url = '/api/stats/usage?period=' + period;
            if (currentDev) url += '&device=' + encodeURIComponent(currentDev);
            const resp = await fetch(url);
            const data = await resp.json();
            apps = data.apps || [];
        } catch(e) {
            listEl.innerHTML = '<p style="color: var(--text-muted); text-align: center; font-size: 0.85em;">加载失败</p>';
            currentApps = [];
            drawChart([]);
            return;
        }

        if (apps.length === 0) {
            listEl.innerHTML = '<p style="color: var(--text-muted); text-align: center; font-size: 0.85em;">暂无数据，等待客户端推送后自动统计</p>';
            currentApps = [];
            drawChart([]);
            return;
        }

        currentApps = apps;
        const total = apps.reduce((s, a) => s + a.seconds, 0);
        listEl.innerHTML = apps.slice(0, 8).map(a => {
            const pct = total > 0 ? (a.seconds / total * 100).toFixed(1) : 0;
            const h = Math.floor(a.seconds / 3600);
            const m = Math.floor((a.seconds % 3600) / 60);
            const ts = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
            return '<div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.88em;">' +
                '<span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 62%;">' +
                '<span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 4px; vertical-align: middle;"></span>' +
                escapeTags(a.app_name) + '</span>' +
                '<span style="color: var(--text-secondary); white-space: nowrap;">' + ts + ' (' + pct + '%)</span></div>';
        }).join('');

        drawChart(apps);
    }

    function ensureChart(cb) {
        if (window.Chart) { cb(); return; }
        const s = document.createElement('script');
        s.src = "{{ url_for('static', filename='chart.min.js') }}";
        s.onload = cb;
        document.head.appendChild(s);
    }

    ensureChart(function() {
        btns.today.addEventListener('click', function(){ load('today'); });
        btns.week.addEventListener('click', function(){ load('week'); });
        btns.month.addEventListener('click', function(){ load('month'); });
        chartBtns.app.addEventListener('click', function(){ setChartMode('app'); });
        chartBtns.category.addEventListener('click', function(){ setChartMode('category'); });

        const devSel = document.getElementById('stats-device-sel');
        devSel.addEventListener('change', function() { currentDev = this.value; load(currentPer); });

        fetch('/api/stats/devices').then(function(r){ return r.json(); }).then(function(d) {
            if (!d.devices || d.devices.length <= 1) return;
            devSel.style.display = '';
            d.devices.forEach(function(dev) {
                var opt = document.createElement('option');
                opt.value = dev; opt.textContent = dev;
                devSel.appendChild(opt);
            });
        }).catch(function(){});

        load('today');
    });
})();
</script>
