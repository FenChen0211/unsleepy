<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="icon" href="{{ page_favicon }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}?v=4">
    {% if page_background %}
    <style>body { background-image: url('{{ page_background }}'); }</style>
    {% endif %}
    <script src="{{ url_for('static', filename='chart.min.js') }}"></script>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="card">
            <h2>使用时长</h2>
            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0;">
                <select id="device-select" style="display: none; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-primary); font-size: 0.85em;">
                    <option value="">全部设备</option>
                </select>
                <button class="btn btn-primary period-btn" data-period="today">今日</button>
                <button class="btn btn-secondary period-btn" data-period="week">本周</button>
                <button class="btn btn-secondary period-btn" data-period="month">本月</button>
            </div>
            <div id="usage-list" style="text-align: left; min-height: 80px; margin-top: 8px;">
                <p style="color: var(--text-secondary); text-align: center;">加载中...</p>
            </div>
        </div>

        <div class="card">
            <h2>分类占比</h2>
            <div style="max-width: 320px; margin: 16px auto 0;">
                <canvas id="category-chart"></canvas>
            </div>
            <p id="chart-empty" style="color: var(--text-secondary); display: none; text-align: center;">暂无数据</p>
        </div>

        <a href="/" style="display: block; text-align: center; margin-top: 16px; font-size: 0.9em; color: var(--text-secondary);">← 返回主页</a>
    </div>

    <script>
        let chartInstance = null;
        const periodBtns = document.querySelectorAll('.period-btn');
        let currentPeriod = 'today';
        let currentDevice = '';

        function setActiveBtn(period) {
            periodBtns.forEach(b => {
                b.className = b.dataset.period === period ? 'btn btn-primary period-btn' : 'btn btn-secondary period-btn';
            });
        }

        async function loadUsage(period) {
            currentPeriod = period;
            setActiveBtn(period);
            const listEl = document.getElementById('usage-list');
            listEl.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">加载中...</p>';

            let url = `/api/stats/usage?period=${period}`;
            if (currentDevice) url += '&device=' + encodeURIComponent(currentDevice);
            const resp = await fetch(url);
            const data = await resp.json();
            const apps = data.apps || [];

            if (apps.length === 0) {
                listEl.innerHTML = '<p style="color: var(--text-muted); text-align: center;">暂无数据</p>';
                drawChart([]);
                return;
            }

            const total = apps.reduce((s, a) => s + a.seconds, 0);
            listEl.innerHTML = apps.map(a => {
                const pct = total > 0 ? (a.seconds / total * 100).toFixed(1) : 0;
                const h = Math.floor(a.seconds / 3600);
                const m = Math.floor((a.seconds % 3600) / 60);
                const timeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
                return `<div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9em;">
                    <span style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
                        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); flex-shrink: 0;"></span>
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(a.app_name)}</span>
                    </span>
                    <span style="color: var(--text-secondary); white-space: nowrap; flex-shrink: 0;">${timeStr} (${pct}%)</span>
                </div>`;
            }).join('');

            drawChart(apps);
        }

        function drawChart(apps) {
            const ctx = document.getElementById('category-chart');
            const emptyEl = document.getElementById('chart-empty');

            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

            if (!apps || apps.length === 0) {
                emptyEl.style.display = 'block';
                ctx.style.display = 'none';
                return;
            }

            const categoryMap = {};
            const colors = ['#3b82f6', '#22c55e', '#eab308', '#ef4444', '#06b6d4', '#10b981', '#f97316', '#a855f7'];
            let ci = 0;
            apps.forEach(a => {
                const cat = a.category || '未分类';
                if (!categoryMap[cat]) {
                    categoryMap[cat] = { seconds: 0, color: colors[ci % colors.length] };
                    ci++;
                }
                categoryMap[cat].seconds += a.seconds;
            });

            const labels = Object.keys(categoryMap);
            const values = labels.map(l => categoryMap[l].seconds);
            const bgColors = labels.map(l => categoryMap[l].color);

            emptyEl.style.display = 'none';
            ctx.style.display = 'block';

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: bgColors,
                        borderWidth: 2,
                        borderColor: '#141414'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#9a9a9a',
                                padding: 16,
                                font: { size: 12 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = total > 0 ? (ctx.raw / total * 100).toFixed(1) : 0;
                                    const h = Math.floor(ctx.raw / 3600);
                                    const m = Math.floor((ctx.raw % 3600) / 60);
                                    return ` ${ctx.label}: ${h}h ${m}m (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        periodBtns.forEach(btn => {
            btn.addEventListener('click', () => loadUsage(btn.dataset.period));
        });

        const devSel = document.getElementById('device-select');
        devSel.addEventListener('change', function() { currentDevice = this.value; loadUsage(currentPeriod); });

        fetch('/api/stats/devices').then(function(r){ return r.json(); }).then(function(d) {
            if (!d.devices || d.devices.length <= 1) return;
            devSel.style.display = '';
            d.devices.forEach(function(dev) {
                var opt = document.createElement('option');
                opt.value = dev; opt.textContent = dev;
                devSel.appendChild(opt);
            });
        }).catch(function(){});

        loadUsage('today');
    </script>
</body>
</html>
